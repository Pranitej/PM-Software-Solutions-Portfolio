<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM Software Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #f8f8f6;
        color: #0d0d12;
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      ::selection {
        background: #0d0d12;
        color: #f8f8f6;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f8f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4ce;
        border-radius: 3px;
      }

      /* ── Layout ── */
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 36px;
      }
      .section-pad {
        padding: 92px 0;
      }

      /* ── Nav ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        height: 64px;
        display: flex;
        align-items: center;
        transition:
          background 0.3s,
          box-shadow 0.3s;
      }
      .nav.scrolled {
        background: rgba(248, 248, 246, 0.93);
        box-shadow: 0 1px 0 #e4e4df;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        color: inherit;
      }
      .nav-logo-mark {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .nav-logo-text {
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.02em;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 26px;
      }
      .nav-link {
        font-size: 14px;
        font-weight: 500;
        color: #7a7a8a;
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-link:hover {
        color: #0d0d12;
      }
      .btn-nav {
        display: inline-flex;
        align-items: center;
        padding: 8px 18px;
        border-radius: 7px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        color: #fff;
        font-family: inherit;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-nav:hover {
        opacity: 0.87;
        transform: translateY(-1px);
      }
      .btn-hero {
        display: inline-flex;
        align-items: center;
        padding: 13px 28px;
        border-radius: 9px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        color: #fff;
        font-family: inherit;
        transition:
          opacity 0.2s,
          transform 0.15s;
        border: none;
        cursor: pointer;
      }
      .btn-hero:hover {
        opacity: 0.87;
        transform: translateY(-1px);
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        padding: 13px 28px;
        border-radius: 9px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        color: #0d0d12;
        font-family: inherit;
        border: 1.5px solid #deded9;
        background: transparent;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
      }
      .btn-ghost:hover {
        border-color: #aaaa a4;
        background: #fff;
        transform: translateY(-1px);
      }

      /* hamburger */
      .nav-hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        padding: 4px;
        background: none;
        border: none;
      }
      .nav-hamburger span {
        display: block;
        width: 20px;
        height: 1.5px;
        background: #0d0d12;
        transition:
          transform 0.25s,
          opacity 0.25s;
      }
      .nav-hamburger.open span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
      }
      .nav-hamburger.open span:nth-child(2) {
        opacity: 0;
      }
      .nav-hamburger.open span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
      }
      .mobile-menu {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 199;
        background: #f8f8f6;
        display: flex;
        flex-direction: column;
        padding: 28px 24px;
        gap: 2px;
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }
      .mobile-menu.open {
        transform: translateX(0);
      }
      .mobile-menu a {
        font-size: 20px;
        font-weight: 600;
        color: #0d0d12;
        text-decoration: none;
        padding: 13px 0;
        border-bottom: 1px solid #e8e8e4;
        letter-spacing: -0.02em;
        transition: color 0.15s;
      }

      /* ── Hero ── */
      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 96px 0 64px;
        position: relative;
        overflow: hidden;
      }
      .hero-dots {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(circle, #c4c4be 1px, transparent 1px);
        background-size: 26px 26px;
        opacity: 0.55;
      }
      .hero-glow {
        position: absolute;
        top: -15%;
        right: -8%;
        width: 55vw;
        height: 55vw;
        max-width: 640px;
        max-height: 640px;
        pointer-events: none;
        border-radius: 50%;
        opacity: 0.06;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 14px;
        border: 1px solid #e0e0db;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #7a7a8a;
        background: #fff;
        margin-bottom: 22px;
      }
      .hero-tag-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        display: inline-block;
      }
      .hero-h1 {
        font-size: clamp(40px, 5.8vw, 72px);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.05;
        margin-bottom: 18px;
        text-wrap: balance;
      }
      .hero-word {
        display: inline-block;
        transition: opacity 0.28s;
      }
      .hero-sub {
        font-size: clamp(16px, 1.8vw, 19px);
        color: #7a7a8a;
        max-width: 560px;
        line-height: 1.75;
        margin-bottom: 32px;
      }
      .hero-ctas {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 60px;
      }
      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border-top: 1px solid #e4e4df;
        padding-top: 36px;
        gap: 0;
        align-items: start;
      }
      .hero-stat {
        min-width: 0;
        padding: 0 24px;
        border-right: 1px solid #e4e4df;
      }
      .hero-stat:first-child {
        padding-left: 0;
      }
      .hero-stat:last-child {
        border-right: none;
        padding-right: 0;
      }
      .hero-stat-n {
        font-size: clamp(28px, 2.9vw, 40px);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
      }
      .hero-stat-l {
        font-size: 13px;
        color: #9090a0;
        margin-top: 3px;
      }

      /* ── Section labels ── */
      .section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .section-h {
        font-size: clamp(26px, 3.4vw, 46px);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }
      .section-sub {
        color: #7a7a8a;
        font-size: 16px;
        line-height: 1.75;
        margin-top: 12px;
        max-width: 560px;
      }

      /* ── About ── */
      .about-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 64px;
        align-items: center;
      }
      .about-caps {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .cap-card {
        padding: 20px 18px;
        background: #fff;
        border: 1px solid #e4e4df;
        border-radius: 12px;
        transition:
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }
      .cap-card:hover {
        border-color: #c8c8c4;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      .cap-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }
      .cap-title {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .cap-desc {
        font-size: 12px;
        color: #9090a0;
        line-height: 1.5;
      }
      .tech-tags {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        margin-top: 22px;
      }
      .tech-tag {
        padding: 4px 11px;
        border: 1px solid #e4e4df;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 500;
        color: #7a7a8a;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .tech-tag:hover {
        border-color: #b0b0aa;
        color: #0d0d12;
      }

      /* ── Process ── */
      .process-section {
        position: relative;
        overflow: hidden;
        background: #fff;
        border-top: 1px solid #e4e4df;
        border-bottom: 1px solid #e4e4df;
      }
      .process-dots {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(circle, #c8c8c2 1px, transparent 1px);
        background-size: 26px 26px;
        opacity: 0.45;
      }
      .process-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
        position: relative;
        z-index: 1;
        border: 1px solid #e4e4df;
        border-radius: 16px;
        overflow: hidden;
        background: #e4e4df;
      }
      .process-card {
        background: #fff;
        padding: 32px 26px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition: background 0.2s;
        cursor: default;
      }
      .process-card:hover {
        background: #f8f8f6;
      }
      .process-num {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #c8c8c8;
      }
      .process-icon-wrap {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .process-title {
        font-weight: 700;
        font-size: 16px;
        letter-spacing: -0.02em;
        line-height: 1.25;
      }
      .process-desc {
        font-size: 13px;
        color: #7a7a8a;
        line-height: 1.65;
      }
      .process-pills {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 4px;
      }
      .process-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #555568;
        font-weight: 500;
      }
      .process-pill-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .process-connector {
        display: none;
      } /* mobile: hidden */

      /* ── Portfolio ── */
      .portfolio-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 36px;
      }
      .portfolio-count {
        font-size: 13px;
        color: #9090a0;
      }
      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 1px solid #e4e4df;
        border-radius: 14px;
        overflow: hidden;
        background: #e4e4df;
        gap: 1px;
      }
      .proj-card {
        padding: 24px 22px;
        background: #fafaf8;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        flex-direction: column;
      }
      .proj-card:hover {
        background: #fff;
      }
      .proj-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .proj-type {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9090a0;
      }
      .proj-year {
        font-size: 11px;
        color: #c0c0c8;
      }
      .proj-title {
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
        line-height: 1.3;
      }
      .proj-client {
        font-size: 12px;
        color: #9090a0;
        margin-bottom: 14px;
      }
      .proj-tags {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .proj-tag {
        padding: 3px 9px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid transparent;
      }
      .proj-cta {
        margin-top: auto;
        padding-top: 14px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        transition: color 0.2s;
      }

      /* ── Testimonials ── */
      .testi-bg {
        background: #fff;
        border-top: 1px solid #e4e4df;
        border-bottom: 1px solid #e4e4df;
      }
      .testi-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .testi-card {
        padding: 28px;
        border: 1px solid #e4e4df;
        border-radius: 14px;
        background: #fafaf8;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
      }
      .testi-card:hover {
        border-color: #c0c0ba;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
        transform: translateY(-2px);
      }
      .testi-quote-mark {
        font-size: 40px;
        line-height: 1;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: -0.05em;
      }
      .testi-text {
        color: #555568;
        font-size: 14px;
        line-height: 1.75;
        margin-bottom: 20px;
        font-style: italic;
      }
      .testi-divider {
        border: none;
        border-top: 1px solid #e8e8e4;
        margin-bottom: 14px;
      }
      .testi-name {
        font-weight: 600;
        font-size: 13px;
      }
      .testi-role {
        font-size: 12px;
        color: #9090a0;
        margin-top: 2px;
      }

      /* ── Contact ── */
      .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 64px;
        align-items: start;
      }
      .contact-info-items {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 32px;
      }
      .contact-info-label {
        font-size: 10px;
        color: #9090a0;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .contact-info-val {
        font-size: 14px;
        color: #555568;
      }
      .contact-form-wrap {
        background: #fff;
        border: 1px solid #e4e4df;
        border-radius: 14px;
        padding: 30px;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-label {
        font-size: 11px;
        color: #7a7a8a;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        background: #f8f8f6;
        border: 1px solid #e4e4df;
        border-radius: 7px;
        padding: 10px 13px;
        color: #0d0d12;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        background: #fff;
      }
      .form-textarea {
        min-height: 96px;
        resize: vertical;
      }
      .form-select {
        cursor: pointer;
      }
      .form-submit {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.01em;
        transition:
          opacity 0.2s,
          transform 0.15s;
        color: #fff;
        margin-top: 4px;
      }
      .form-submit:hover {
        opacity: 0.87;
        transform: translateY(-1px);
      }
      .success-state {
        text-align: center;
        padding: 36px 0;
      }
      .success-check {
        font-size: 32px;
        margin-bottom: 12px;
      }
      .success-title {
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 6px;
      }
      .success-sub {
        color: #7a7a8a;
        font-size: 14px;
      }

      /* ── Footer ── */
      .footer {
        border-top: 1px solid #e4e4df;
        padding: 28px 0;
      }
      .footer-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 14px;
      }
      .footer-copy {
        font-size: 12px;
        color: #b0b0b8;
      }
      .footer-links {
        display: flex;
        gap: 20px;
      }
      .footer-link {
        color: #9090a0;
        font-size: 12px;
        text-decoration: none;
        transition: color 0.2s;
      }
      .footer-link:hover {
        color: #0d0d12;
      }

      /* ── Reveal ── */
      .reveal {
        opacity: 0;
        transform: translateY(22px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .reveal.visible {
        opacity: 1;
        transform: none;
      }

      /* ── Tweaks ── */
      #tweaks-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        background: #fff;
        border: 1px solid #e0e0db;
        border-radius: 12px;
        padding: 18px;
        width: 220px;
        display: none;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      #tweaks-panel.visible {
        display: flex;
      }
      #tweaks-panel h4 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9090a0;
      }
      .tw-row {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .tw-row label {
        font-size: 11px;
        color: #9090a0;
      }
      .tw-row select {
        width: 100%;
        background: #f8f8f6;
        border: 1px solid #e4e4df;
        color: #0d0d12;
        border-radius: 6px;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        outline: none;
      }
      .tw-swatches {
        display: flex;
        gap: 7px;
      }
      .tw-swatch {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        cursor: pointer;
        border: 2.5px solid transparent;
        transition: border-color 0.2s;
      }
      .tw-swatch.active {
        border-color: #0d0d12;
      }

      /* ── Responsive ── */
      @media (max-width: 1024px) {
        .about-grid {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .process-grid {
          grid-template-columns: 1fr 1fr;
        }
        .portfolio-grid {

      function useReveal(delay = 0) {
        const ref = useRef(null);
        useEffect(() => {
          if (!ref.current) return;
          const el = ref.current;
          el.classList.add("reveal");
          const obs = new IntersectionObserver(
            ([e]) => {
              if (e.isIntersecting) {
                setTimeout(() => el.classList.add("visible"), delay);
                obs.disconnect();
              }
            },
            { threshold: 0.08 },
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);
        return ref;

      // ── APP ──────────────────────────────────────────────────
      function App() {
        const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
        const accent = ACCENTS[tweaks.accentIndex].color;

        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode")
              document.getElementById("tweaks-panel").classList.add("visible");
            else if (e.data?.type === "__deactivate_edit_mode")
              document
                .getElementById("tweaks-panel")
                .classList.remove("visible");
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");

          const row = document.getElementById("tw-swatches");
          if (row && !row.hasChildNodes()) {
            ACCENTS.forEach((a, i) => {
              const el = document.createElement("div");
              el.className =
                "tw-swatch" + (i === tweaks.accentIndex ? " active" : "");
              el.style.background = a.hex;
              el.title = a.label;
              el.onclick = () => {
                setTweaks((t) => ({ ...t, accentIndex: i }));
                document
                  .querySelectorAll(".tw-swatch")
                  .forEach((s, j) => s.classList.toggle("active", j === i));
                window.parent.postMessage(
                  { type: "__edit_mode_set_keys", edits: { accentIndex: i } },
                  "*",
                );
              };
              row.appendChild(el);
            });
          }
          const radSel = document.getElementById("tw-radius");
          if (radSel) {
            radSel.value = tweaks.cardRadius;
            radSel.onchange = (e) => {
              setTweaks((t) => ({ ...t, cardRadius: e.target.value }));
              window.parent.postMessage(
                {
                  type: "__edit_mode_set_keys",
                  edits: { cardRadius: e.target.value },
                },
                "*",
              );
            };
          }
          return () => window.removeEventListener("message", handler);
        }, []);

        return (
          <>
            <Nav accent={accent} cardRadius={tweaks.cardRadius} />
            <Hero accent={accent} />
            <About accent={accent} cardRadius={tweaks.cardRadius} />
            <Process accent={accent} cardRadius={tweaks.cardRadius} />
            <Portfolio accent={accent} cardRadius={tweaks.cardRadius} />
            <Testimonials accent={accent} cardRadius={tweaks.cardRadius} />
            <Contact accent={accent} cardRadius={tweaks.cardRadius} />
            <Footer accent={accent} cardRadius={tweaks.cardRadius} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
